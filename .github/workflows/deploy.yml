name: Deploy to Coolify

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Llamar al Webhook de Coolify
        run: |
          curl -X GET "${{ secrets.COOLIFY_WEBHOOK }}" \
          -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}"
